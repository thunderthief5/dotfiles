; в–Ҳв–‘в–Җв–‘в–ҲвҖғв–Ҳв–„в–ҲвҖғв–Ҳв–„в–ҖвҖғв–Ҳв–„в–ҲвҖғв–Ҳв–„в–„вҖғв–Ҳв–Ҳв–„вҖғв–„в–Ҳ vim:fileencoding=utf-8:foldmethod=marker:ft=dosini


[colors]

; Dracula
bg   = #ff1b1b1b
fg   = #6272a4
ac-1 = #bd93f9
ac-2 = #ff9999
ac-3 = #50fa7b

; extra colors
ac-4 = #9999ff
ac-5 = #6699ff

; Nord
;bg   = #ff1b1b1b
;fg   = #ECEFF4
;ac-1 = #81A1C1
;ac-2 = #BF616A

; Red
;bg   = #ff1b1b1b
;fg   = #FD8C94
;ac-1 = #d62c55
;ac-2 = #ff9999


; {{{ Most Used Modules for bspwm and openbox

[module/time]
type     = internal/date
interval = 1.0
#date    = пҒ“п„„%H:%Mп„…пҒ”
date     = %H:%M

label            = %date%
label-foreground = ${colors.ac-1}

format =%{A1:~/.config/rofi/scripts/rofifetch:}%{A3:~/.config/rofi/scripts/dmenubar:}<label>%{A}%{A}

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/xwindow]
type          = internal/xwindow
label         = [ %title:0:36:...% ]
;label-maxlen = 50

label-foreground = ${colors.fg}
format-padding   = 2
format           = %{A1:rofi -modi window -show window -display-window 'п…ә':}%{A3:rofi -modi windowcd -show windowcd -display-windowcd 'п…ә':}<label>%{A}%{A}

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/bspwm]
type = internal/bspwm

;ws-icon-0 = 1;пӮ¬
;ws-icon-1 = 2;пҮӢ
;ws-icon-2 = 3;пҮ»
;ws-icon-3 = 4;пғғ

format                    = <label-state> <label-mode>
label-focused             = %index%
;label-focused-background =
label-focused-underline   = #000000
label-focused-foreground  = ${colors.ac-1}
label-focused-padding     = 2
label-occupied            = %index%
label-ocupied-foreground  = ${colors.fg}
label-occupied-padding    = 2
label-urgent              = %index%!
label-urgent-background   = ${colors.ac-2}
label-urgent-padding      = 2
label-empty               = %index%
label-empty-foreground    = #406272a4
label-empty-padding       = 2

; Separator in between workspaces
; label-separator = |


label-monocle                = " пҒ® "
label-monocle-foreground     = ${colors.fg}
label-tiled                  = " пҖҠ "
label-tiled-foreground       = ${colors.fg}
label-fullscreen             = " пҒҘ "
label-fullscreen-foreground  = ${colors.fg}
label-floating               = " пӢҗ "
label-floating-foreground    = ${colors.fg}
label-pseudotiled            = " пҖү "
label-pseudotiled-foreground = ${colors.fg}
label-locked                 = " пҖЈ "
label-locked-foreground      = ${colors.fg}
label-sticky                 = " пӮҚ "
label-sticky-foreground      = ${colors.fg}
label-private                = " пӣә "
label-private-foreground     = ${colors.fg}

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/i3]
type            = internal/i3
pin-workspaces  = true
strip-wsnumbers = false
index-sort      = false
enable-click    = true
enable-scroll   = true
wrapping-scroll = true
reverse-scroll  = false
fuzzy-match     = false

;extra icons to choose from
;http://fontawesome.io/cheatsheet/
; п„Ў пү¬ пү© пӮӯ п…ј пҢҖ пҒӯv  п„• пҒј пҒ» пү’

;ws-icon-0 = 1;пӮ¬
;ws-icon-1 = 2;пҮӢ
;ws-icon-2 = 3;пҮ»
;ws-icon-3 = 4;пғғ

; Available tags:
;   <label-state> (default) - gets replaced with <label-(focused|unfocused|visible|urgent)>
;   <label-mode> (default)
format = <label-state> <label-mode>

label-mode         = %mode%
label-mode-padding = 2

; Available tokens:
;   %name%
;   %icon%
;   %index%
;   %output%
; Default: %icon%  %name%
; focused                = Active workspace on focused monitor
label-focused            = %name%
label-focused-foreground = ${colors.ac-1}
label-focused-padding    = 2

; unfocused             = Inactive workspace on any monitor
label-unfocused         = %name%
label-unfocused-padding = 2

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/workspaces]
type           = internal/xworkspaces
pin-workspaces = false
enable-click   = true
enable-scroll  = true
format-padding = 0
;icon-0        = 1;оЁі
;icon-1        = 2;пӮ¬
;icon-2        = 3;о¬Ө
;icon-3        = 4;оЁҙ

icon-default              =
format                    = <label-state>
label-active              = %index%
label-occupied            = %index%
label-urgent              = %index%
label-empty               = %index%
label-occupied-padding    = 2
label-empty-padding       = 2
label-urgent-padding      = 2
label-active-padding      = 2
label-active-foreground   = ${colors.ac-1}
label-active-underline    = #99ffff
label-occupied-foreground = ${colors.fg}
label-occupied-underline  = ${colors.fg}
label-urgent-foreground   = ${colors.ac-2}
label-urgent-underline    = ${colors.ac-2}
label-empty-foreground    = #406272a4

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/volumebar]
type                            = internal/alsa
format-volume                   = <bar-volume>
bar-volume-width                = 10
interval                        = 10
bar-volume-empty                = "I"
bar-volume-empty-foreground     = #406272a4
bar-volume-fill                 = "I"
bar-volume-fill-foreground      = ${colors.ac-5}
bar-volume-indicator            = "|"
bar-volume-indicator-foreground = ${colors.ac-1}

format-muted = %{F#ff9999}<bar-volume>%{F-}

; пҒЁ пҒ§

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/brightnessbar]
type = internal/backlight

; Use the following command to list available cards:
; $ ls -1 /sys/class/backlight/
card                     = intel_backlight
format                   = <bar>
bar-width                = 10
interval                 = 10
bar-empty                = "I"
bar-empty-foreground     = #406272a4
bar-fill                 = "I"
bar-fill-foreground      = ${colors.ac-5}
bar-indicator            = "|"
bar-indicator-foreground = ${colors.ac-1}

